<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}">
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    </head>

    <body>
        <div id="login_space">
            <div id="logo_space">
                <img src="{{ url_for('static', path='images/logo.png') }}" width="100px">
                <p>Registro</p>
            </div>
            <form>
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <input type="submit" id="envio" value="Aceptar">
            </form>
        </div>

        <script>
            // Your web app's Firebase configuration
            const firebaseConfig = {
              apiKey: "AIzaSyBCcn0mU4PirmxlVdjZsJ5h94n3fBfH9oY",
              authDomain: "backendpi-4559c.firebaseapp.com",
              projectId: "backendpi-4559c",
              storageBucket: "backendpi-4559c.firebasestorage.app",
              messagingSenderId: "1066212849838",
              appId: "1:1066212849838:web:6f539cd2b47b8ff4d3153f"
            };

            firebase.initializeApp(firebaseConfig);

            submit = document.getElementById("envio");
            submit.addEventListener("click", (event) => {
                event.preventDefault();
            
                email = document.getElementById("email").value;
                password = document.getElementById("password").value;
                const auth = firebase.auth();
                auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed in
                    console.log("Usuario registrado exitosamente");
                    const user = userCredential.user;
                    console.log(user);
                    window.location.href = "interfaz-administrador.html";
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;
                    console.error(errorCode, errorMessage);
                });
            });
        </script>
    </body>
</html>
